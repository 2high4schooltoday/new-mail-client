[graph]
all-features = true

[advisories]
ignore = [
  # No upstream fix yet for rsa used via pgp; tracked until patched release exists.
  "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
